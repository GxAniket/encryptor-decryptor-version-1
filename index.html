<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Encryptor - Decryptor</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: url('image/NEW.png') no-repeat center;
  background-size: cover;
  color: white;
}

/* HEADER */
.header {
  position: fixed;
  top: 0;
  width: 100%;
  background: black;
  text-align: center;
  padding: 12px;
  font-size: 20px;
  z-index: 999;
}

/* MENU BUTTON */
.menu-toggle {
  position: fixed;
  top: 10px;
  left: 10px;
  background: black;
  border: 2px solid #9146ff;
  border-radius: 10px;
  color: white;
  padding: 5px 10px;
  z-index: 1001;
}

/* SIDE MENU */
.side-menu {
  position: fixed;
  top: 0;
  left: -220px;
  width: 220px;
  height: 100%;
  background: rgba(0,0,0,0.9);
  padding-top: 70px;
  transition: 0.3s;
  z-index: 1000;
}

.side-menu.open {
  left: 0;
}

.side-menu a {
  display: block;
  padding: 15px;
  color: white;
  text-decoration: none;
  border-bottom: 1px solid #333;
}

.side-menu a:hover {
  background: #111;
}

/* MAIN */
.main {
  text-align: center;
  padding: 90px 20px 40px;
}

/* LOGO */
.logo img {
  width: 90%;
  max-width: 280px;
  border-radius: 10px;
  box-shadow: 0 0 20px black;
}

/* BUTTONS */
.nav-buttons {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
  margin-top: 30px;
}

.nav-buttons a {
  padding: 12px 20px;
  background: black;
  border: 2px solid #9146ff;
  border-radius: 10px;
  color: white;
  text-decoration: none;
  transition: 0.3s;
}

.nav-buttons a:hover {
  background: #111;
}

/* ABOUT */
#about {
  padding: 30px 15px;
  background: rgba(0,0,0,0.7);
  text-align: center;
  font-size: 14px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 10px;
  font-size: 13px;
}

/* 📱 MOBILE FIX */
@media (max-width: 768px) {
  .nav-buttons {
    flex-direction: column;
    align-items: center;
  }

  .nav-buttons a {
    width: 80%;
  }

  .header {
    font-size: 18px;
  }

  .menu-toggle {
    font-size: 14px;
  }
}
</style>
</head>

<body>

<button class="menu-toggle" onclick="toggleMenu()">☰ Menu</button>

<div class="side-menu" id="sideMenu">
  <a href="Text.html">Encrypt Text</a>
  <a href="encryptor.html">File Encryption</a>
  <a href="https://github.com/GxAniket" target="_blank">Github</a>
  <a href="#about" onclick="toggleMenu()">About</a>
</div>

<div class="header">
  Encryptor - Decryptor
</div>

<div class="main">
  <div class="logo">
    <img src="image/ED.png">
  </div>

  <div class="nav-buttons">
    <a href="Text.html">Encrypt Text</a>
    <a href="encryptor.html">Encrypt File</a>
  </div>
</div>

<div id="about">
  <h2>About</h2>
  <p>This tool helps you encrypt and decrypt files and text securely.</p>
</div>

<footer>
  Made with ❤️ by Aniket |
  <a href="https://github.com/GxAniket" target="_blank">GitHub</a>
</footer>

<script>
function toggleMenu() {
  document.getElementById("sideMenu").classList.toggle("open");
}
</script>

</body>
</html>
