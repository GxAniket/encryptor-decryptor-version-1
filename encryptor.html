<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>File Encryptor ⇄ Decryptor</title>

<style>
:root {
  --bg: #0f172a;
  --surface: #1e293b;
  --accent: #3b82f6;
  --text: #f1f5f9;
}

/* Reset */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: ui-rounded, "Segoe UI", system-ui;
}

/* Body */
body {
  min-height: 100vh;
  background: var(--bg) url('image/NEW.png') no-repeat center;
  background-size: cover;
  color: var(--text);
  padding-top: 70px;
}

/* Header */
.header {
  position: fixed;
  top: 0;
  width: 100%;
  background: black;
  text-align: center;
  padding: 12px;
  font-size: 18px;
  z-index: 999;
}

/* Back Button */
.back-button {
  position: fixed;
  top: 12px;
  left: 12px;
  background: black;
  border: 2px solid #9146ff;
  color: white;
  border-radius: 10px;
  padding: 6px 10px;
  font-size: 14px;
}

/* Card */
.card {
  width: 90%;
  max-width: 420px;
  margin: 20px auto;
  background: rgba(30, 41, 59, 0.95);
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* Heading */
h1 {
  text-align: center;
  margin-bottom: 20px;
  font-size: 20px;
}

/* Inputs */
input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  margin-bottom: 15px;
  border-radius: 10px;
  border: 2px solid var(--accent);
  background: var(--bg);
  color: white;
}

/* Buttons */
.btn-row {
  display: flex;
  gap: 10px;
}

button {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: var(--accent);
  color: white;
  font-weight: bold;
}

/* Status */
.status {
  text-align: center;
  margin-top: 10px;
}

/* About */
.about {
  margin: 20px;
  padding: 15px;
  background: rgba(0,0,0,0.7);
  border-radius: 10px;
  text-align: center;
  font-size: 14px;
}

/* Mobile Fix */
@media (max-width: 768px) {
  .btn-row {
    flex-direction: column;
  }

  h1 {
    font-size: 18px;
  }
}
</style>
</head>

<body>

<div class="header">Encryptor ⇄ Decryptor</div>

<button class="back-button" onclick="history.back()">← Back</button>

<main class="card">
<h1>File Encryptor ⇄ Decryptor</h1>

<label>Choose file</label>
<input type="file" id="fileInput" />

<label>Password</label>
<input type="password" id="passwordInput" minlength="8" />

<div class="btn-row">
<button id="encryptBtn">Encrypt 🔒</button>
<button id="decryptBtn">Decrypt 🔓</button>
</div>

<div id="status" class="status"></div>
</main>

<div class="about">
<h2>About</h2>
<p>This tool encrypts and decrypts files securely in your browser. No data is uploaded.</p>
</div>

<script>
const enc = new TextEncoder();
const toB64 = (buf) => btoa(String.fromCharCode(...new Uint8Array(buf)));
const fromB64 = (str) => Uint8Array.from(atob(str), c => c.charCodeAt(0));

function download(data, name) {
  const blob = new Blob([data]);
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
}

async function deriveKey(password, salt) {
  const keyMaterial = await crypto.subtle.importKey(
    "raw", new TextEncoder().encode(password), {name:"PBKDF2"}, false, ["deriveKey"]
  );

  return crypto.subtle.deriveKey({
    name:"PBKDF2",
    salt,
    iterations:250000,
    hash:"SHA-256"
  }, keyMaterial, {name:"AES-GCM", length:256}, false, ["encrypt","decrypt"]);
}

async function encryptFile(file, password) {
  const data = await file.arrayBuffer();
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(password, salt);

  const encrypted = await crypto.subtle.encrypt({name:"AES-GCM", iv}, key, data);

  const payload = JSON.stringify({
    name:file.name,
    salt:toB64(salt),
    iv:toB64(iv),
    data:toB64(encrypted)
  });

  download(payload, file.name + ".enc");
}

async function decryptFile(file, password) {
  const text = await file.text();
  const payload = JSON.parse(text);

  const key = await deriveKey(password, fromB64(payload.salt));
  const decrypted = await crypto.subtle.decrypt(
    {name:"AES-GCM", iv:fromB64(payload.iv)},
    key,
    fromB64(payload.data)
  );

  download(decrypted, payload.name);
}

const fileInput = document.getElementById("fileInput");
const passwordInput = document.getElementById("passwordInput");
const encryptBtn = document.getElementById("encryptBtn");
const decryptBtn = document.getElementById("decryptBtn");
const status = document.getElementById("status");

encryptBtn.onclick = async () => {
  const file = fileInput.files[0];
  if (!file) return alert("Select file");
  await encryptFile(file, passwordInput.value);
  status.innerText = "Encrypted ✔️";
};

decryptBtn.onclick = async () => {
  const file = fileInput.files[0];
  if (!file) return alert("Select file");
  await decryptFile(file, passwordInput.value);
  status.innerText = "Decrypted ✔️";
};
</script>

</body>
</html>
